packages:
  - "src"
  - "examples/*"

# Dependency overrides. Most are security pins that force a vulnerable transitive
# up to a patched version (audit:ci fails on any advisory >= low). They live here,
# rather than package.json's `pnpm.overrides`, so each pin can carry the rationale
# inline (package.json is strict JSON and can't hold comments).
overrides:
  # Pin viem to a single resolved version across the tree.
  "viem": "1.20.0"

  # ws (WebSocket lib) is pulled transitively by viem and by BOTH ethers majors.
  # GHSA-58qx-3vcg-4xpx (uninitialized memory disclosure): vulnerable >=8.0.0
  # <8.20.1, patched in 8.20.1. viem@1.20 declares ws@8.13.0 and Safe's ethers@6
  # also lands on a vulnerable 8.x, so both 8.x lineages are pinned forward to
  # 8.20.1. Safe to do: it's a patch bump within 8.x, and ws is only exercised by
  # websocket transports (this SDK uses http). Pins are scoped per-parent
  # ("viem>ws", "ethers>ws") instead of a blanket "ws" so the separate ethers-v5
  # 7.x line below is not dragged onto the 8.x API.
  "viem>ws": "8.20.1"
  "ethers>ws": "8.20.1"
  # ethers v5 (@ethersproject/providers, a direct dependency of `src`) uses the
  # ws 7.x line. 7.5.10 is the patched 7.x from an earlier advisory (the one
  # above only affects 8.x); kept so v5 can't fall back to a vulnerable older 7.x.
  "@ethersproject/providers>ws": "7.5.10"

  # Compatibility pins for `wagmi generate` (not security-related).
  "@wagmi/cli>esbuild": "0.25.1"
  "@wagmi/cli>bundle-require": "5.1.0"

  # Inherited from the yarn->pnpm migration: force vulnerable crypto transitives
  # up to patched versions to keep audit:ci green. See git history for origin.
  "elliptic": "6.6.1"
  "nanoid": "3.3.8"
  "base-x": "3.0.11"
  "pbkdf2": "3.1.3"
  "sha.js": "2.4.12"
  "cipher-base": "1.0.5"

  # GHSA-ph9p-34f9-6g65 (path traversal via unsanitized prefix/postfix):
  # vulnerable <0.2.6, patched in 0.2.6. tmp is used only by patch-package at
  # install time (dev-only). patch-package declares tmp@^0.0.33, so without this
  # pin it resolves to a vulnerable 0.x; 0.2.6 is a patch bump over the prior pin.
  "tmp": "0.2.6"

  # GHSA-jxxr-4gwj-5jf2 (ReDoS): a large numeric range defeats brace-expansion's
  # documented `max` DoS guard. Vulnerable >=5.0.0 <5.0.6, patched in 5.0.6.
  # The tree also carries brace-expansion 1.1.14 and 2.1.0 (pulled by older
  # minimatch versions via CommonJS require()). The "@5.0.5" selector scopes the
  # override to ONLY the already-5.x instance; a plain "brace-expansion" key would
  # drag the 1.x/2.x copies across four majors and risk breaking those consumers.
  "brace-expansion@5.0.5": "5.0.6"

  # Pinned to a single resolved version (added with the types package, #707).
  "zod": "4.3.6"
  "postcss": "8.5.10"
