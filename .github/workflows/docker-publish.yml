name: Docker Publish

on:
  pull_request:
  workflow_run:
    workflows: ['Build, Test']
    types: [completed]
    branches: [feat/cli-rc]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build${{ github.event_name == 'workflow_run' && ' and Publish' || '' }}
    runs-on: ubuntu-latest
    # On workflow_run, publish only if the triggering CI was successful AND the parent run
    # was triggered by a direct push (not a PR from feat/cli-rc, which would also match the
    # branch filter).
    if: >
      github.event_name == 'pull_request' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'workflow_run'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            {
              echo "tags<<EOF"
              echo "offchainlabs/arbitrum-chain-sdk:cli-rc"
              echo "offchainlabs/arbitrum-chain-sdk:cli-rc-$SHORT_SHA"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=arbitrum-chain-sdk:pr" >> "$GITHUB_OUTPUT"
          fi

      - name: Build${{ github.event_name == 'workflow_run' && ' and push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'workflow_run' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
