name: Docker Publish

on:
  pull_request:
  workflow_dispatch:
    inputs:
      latest:
        description: 'Also tag this build as :latest'
        type: boolean
        default: false
      tag:
        description: 'Optional additional tag to publish (e.g., v3.0.0). Leave blank to skip.'
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ github.event_name == 'pull_request' && 'Build' || 'Build and Publish' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ${{ github.event_name == 'pull_request' && 'Build' || 'Build and push' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            offchainlabs/arbitrum-chain-sdk:${{ github.sha }}
            ${{ inputs.latest && 'offchainlabs/arbitrum-chain-sdk:latest' || '' }}
            ${{ inputs.tag != '' && format('offchainlabs/arbitrum-chain-sdk:{0}', inputs.tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
